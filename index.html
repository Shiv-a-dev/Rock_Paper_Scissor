<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Document</title>
</head>
<body>
    <main class="app-shell">
        <section class="game-card">
            <div id="headcontainer">
                <h1 id="heading">Rock👊 Paper✋ Scissors✌️</h1>
                <p class="subtitle">First to 5 wins takes the match.</p>
            </div>

            <section class="play-area">
                <h3 class="move move-lead">Make your move!</h3>
                <div id="container">
                    <button class="btn rock-btn">Rock</button>
                    <button class="btn paper-btn">Paper</button>
                    <button class="btn scissors-btn">Scissors</button>
                </div>
            </section>

            <section class="status-panel">
                <h4 class="move">Your move:</h4>
                <h4 class="move">Computer's move:</h4>
                <h4 class="move">Current Result:</h4>
                <h4 class="move">Round Number:</h4>
                <h4 class="move">Round Won by User:</h4>
                <h4 class="move">Round Won by Computer:</h4>
            </section>
        </section>

        <div id="winnerPopup" class="popup hidden" aria-hidden="true">
            <div class="popup-content">
                <span class="popup-badge">Match complete</span>
                <h2 id="winnerMessage">Winner</h2>
                <p class="popup-copy">Start a fresh game and try to take the next match.</p>
                <button id="newGameButton" class="new-game-btn">New Game</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
